        <div class="card"><img src="c.png"><p>Work 03</p></div>
        <div class="card"><img src="d.png"><p>Work 04</p></div>
        <div class="card"><img src="e.png"><p>Work 05</p></div>

    <footer style="margin-top: 50px; padding: 20px; color: #555;">

    </footer>

</html>
